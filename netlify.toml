[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Your real site pages - serve normally
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/residential"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/commercial"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/commercial/reinstatement"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/portfolio"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/gallery"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/index.html"
  status = 200

# All other URLs (old WordPress pages, image attachments, etc.) return 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[images]
  remote_images = ["https://drive.google.com/.*"]

[build]
  command = "npm run build"
  publish = "dist"

# Redirect old unrelated WordPress pages to the homepage
[[redirects]]
  from = "/is-ppsspp-legal-everything-you-need-to-know/"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/cpd-requirements-for-nurses-in-the-philippines-latest-updates/"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/understanding-california-rental-application-laws-what-you-need-to-know/"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/understanding-conditional-sale-and-purchase-agreements-legal-guide/"
  to = "/"
  status = 301
  force = true

# Redirect old portfolio URL if needed
[[redirects]]
  from = "/portfolio"
  to = "/gallery"
  status = 301
  force = true

# WordPress system paths
[[redirects]]
  from = "/wp-admin/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/wp-content/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/wp-includes/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/wp-json/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/wp-login.php"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/xmlrpc.php"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/feed"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/*/feed"
  to = "/"
  status = 301
  force = true

# API routes, if you use Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# React SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
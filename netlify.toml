[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NETLIFY_DISABLE_FORCED_TRAILING_SLASH = "true"

# =========================================================
# 1) CANONICAL / CLEANUP REDIRECTS
# =========================================================


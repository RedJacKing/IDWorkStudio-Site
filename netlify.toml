[build]
  command = "npm run build"
  publish = "dist"

# ─── API ────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# ─── REAL SITE PAGES (SPA rewrites — serve index.html at each route) ────────
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/residential"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/commercial"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/commercial/reinstatement"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/gallery"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/index.html"
  status = 200

# ─── OLD URL ALIASES → correct current pages (301 = permanent redirect) ─────
# If /portfolio was a real page on your old WordPress site, this sends
# anyone (and Google) who still has the old link to the correct new page.
[[redirects]]
  from = "/portfolio"
  to = "/gallery"
  status = 301

# ─── WORDPRESS SYSTEM URLS → homepage (301) ─────────────────────────────────
# These tell Google: "these pages are permanently gone, stop visiting them."
# A 301 cleans up Google's index much faster than a 404 ever will.
# Order matters — Netlify matches top-to-bottom, first match wins.

[[redirects]]
  from = "/wp-admin"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-admin/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-login.php"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-content/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-includes/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-json/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-sitemap*"
  to = "/"
  status = 301

[[redirects]]
  from = "/xmlrpc.php"
  to = "/"
  status = 301

[[redirects]]
  from = "/feed"
  to = "/"
  status = 301

[[redirects]]
  from = "/feed/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/category/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/tag/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/author/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/page/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/comments/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/trackback/*"
  to = "/"
  status = 301

# ─── CATCH-ALL — everything else returns 404 ────────────────────────────────
# This must always be last. Any URL not matched above hits this rule.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ─── IMAGES ─────────────────────────────────────────────────────────────────
[images]
  remote_images = ["https://drive.google.com/.*"]

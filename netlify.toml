[build]
  command = "npm run build"
  publish = "dist"

# ─── 1. KILL UNRELATED LEGAL/ARTICLE GHOSTS (Step 1 Fix) ──────────────────
# These are the specific "unrelated" pages mentioned in your feedback.
# We use 301 to move their "trust" to your homepage.

[[redirects]]
  from = "/old-legal-article-name" 
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/terms-and-conditions-old" 
  to = "/"
  status = 301
  force = true

# ─── 2. AGGRESSIVE WP CLEANUP (410 GONE) ──────────────────────────────────
# Tells Google "Stop checking these, they are never coming back."

[[redirects]]
  from = "/category/*"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/tag/*"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/author/*"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/attachment/*"
  to = "/"
  status = 410
  force = true

[[redirects]]
  from = "/20*/**"
  to = "/"
  status = 410
  force = true

# ─── 3. REDIRECT WP SYSTEM URLS (301) ─────────────────────────────────────

[[redirects]]
  from = "/wp-admin/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/wp-content/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/wp-includes/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/wp-json/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/wp-login.php"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/xmlrpc.php"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/feed"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/*/feed"
  to = "/"
  status = 301
  force = true

# ─── 4. OLD URL ALIASES ───────────────────────────────────────────────────

[[redirects]]
  from = "/portfolio"
  to = "/gallery"
  status = 301
  force = true

# ─── 5. NETLIFY FUNCTIONS API ─────────────────────────────────────────────

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# ─── 6. REACT SPA CATCH-ALL (Must be LAST) ────────────────────────────────
# This ensures your residential, commercial, and gallery pages work.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200